name: ProTrader scans (cloud cron)

# Free 24x7 cloud scanner — no PC needed. Times are UTC; IST = UTC + 5:30.
on:
  schedule:
    - cron: '15 2 * * 1-5'         # 07:45 IST — PRE-MARKET daily scan (setups ready before open)
    - cron: '0,30 4-9 * * 1-5'     # 09:30–15:00 IST — LIVE intraday, every 30 min
    - cron: '0 10 * * 1-5'         # 15:30 IST — LIVE intraday, market close
    - cron: '30 12 * * 1-5'        # 18:00 IST — POST-MARKET daily + weekly + SELF-IMPROVEMENT
  workflow_dispatch:               # manual run (Actions tab or in-app "ScanNow")
    inputs:
      tf:
        description: 'Timeframe (auto/daily/weekly/intraday)'
        required: false
        default: 'auto'

concurrency:
  group: protrader-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Write .env from secrets
        run: |
          cat > .env <<'EOF'
          ANGEL_API_KEY=${{ secrets.ANGEL_API_KEY }}
          ANGEL_SECRET_KEY=${{ secrets.ANGEL_SECRET_KEY }}
          ANGEL_TOTP_SECRET=${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_CLIENT_CODE=${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_MPIN=${{ secrets.ANGEL_MPIN }}
          ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY=${{ secrets.TWELVE_DATA_KEY }}
          VERCEL_TOKEN=${{ secrets.VERCEL_TOKEN }}
          EOF
      - name: Run scan by session (or manual timeframe)
        run: |
          TF="${{ github.event.inputs.tf }}"
          if [ -n "$TF" ] && [ "$TF" != "auto" ]; then
            echo "MANUAL ScanNow — $TF"
            case "$TF" in
              intraday) node scripts/screener.mjs --tf intraday --limit 500 ;;
              weekly)   node scripts/screener.mjs --tf weekly ;;
              *)        node scripts/screener.mjs --full --top 60 --improve ;;
            esac
          else
            H=$((10#$(date -u +%H)))
            if [ "$H" -eq 2 ]; then
              echo "PRE-MARKET — daily scan (setups before open)"
              node scripts/screener.mjs --top 60
            elif [ "$H" -ge 4 ] && [ "$H" -le 10 ]; then
              echo "LIVE — intraday pre-move scan"
              node scripts/screener.mjs --tf intraday --limit 500
            else
              echo "POST-MARKET — full daily + weekly + self-improvement"
              node scripts/screener.mjs --full --top 60 --improve
              node scripts/screener.mjs --tf weekly
            fi
          fi
      - name: Deploy fresh data to Vercel
        run: npx --yes vercel@latest deploy --prod --yes --scope vishalcurators-projects --token=${{ secrets.VERCEL_TOKEN }}
