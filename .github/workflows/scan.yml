name: ProTrader scans (cloud cron)

# 24x7 cloud scanner + real-time Telegram alerts. Times UTC; IST = UTC + 5:30.
on:
  schedule:
    # Every 30 min during LIVE market ~09:00–23:00 IST, Mon–Fri. Uses OFF-PEAK
    # minutes (:07/:37, not :00/:30) because GitHub drops far more top-of-hour runs.
    - cron: '7 3-17 * * 1-5'       # :07 of hours 03–17 UTC (≈08:37…22:37 IST)
    - cron: '37 3-17 * * 1-5'      # :37 of hours 03–17 UTC (≈09:07…23:07 IST)
  workflow_dispatch:               # manual (Actions tab or in-app ScanNow)
    inputs:
      tf:
        description: 'auto/daily/weekly/intraday'
        required: false
        default: 'auto'

permissions:
  contents: write                  # persist state (ledger/goal/tuning/tg_sent) back to repo

concurrency:
  group: protrader-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Write .env from secrets
        run: |
          cat > .env <<'EOF'
          ANGEL_API_KEY=${{ secrets.ANGEL_API_KEY }}
          ANGEL_SECRET_KEY=${{ secrets.ANGEL_SECRET_KEY }}
          ANGEL_TOTP_SECRET=${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_CLIENT_CODE=${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_MPIN=${{ secrets.ANGEL_MPIN }}
          ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY=${{ secrets.TWELVE_DATA_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_TOKEN=${{ secrets.VERCEL_TOKEN }}
          EOF
      - name: Run scan by session (sends Telegram alerts for new signals)
        run: |
          TF="${{ github.event.inputs.tf }}"
          H=$((10#$(date -u +%H))); MIN=$((10#$(date -u +%M)))
          if [ -n "$TF" ] && [ "$TF" != "auto" ]; then
            case "$TF" in
              intraday) node scripts/screener.mjs --tf intraday --full ;;
              weekly)   node scripts/screener.mjs --tf weekly --full ;;
              *)        node scripts/screener.mjs --full --top 80 --improve ;;
            esac
          elif [ "$H" -eq 12 ] && [ "$MIN" -lt 25 ]; then
            echo "POST-MARKET ~17:30 IST — full daily + weekly + self-improvement"
            node scripts/screener.mjs --full --top 80 --improve
            node scripts/screener.mjs --tf weekly --full
          elif [ "$H" -ge 3 ] && [ "$H" -le 4 ]; then
            echo "MORNING ~08:37-10:07 IST — FULL daily board (scan ALL NSE) + self-improve on yesterday's completed session"
            node scripts/screener.mjs --full --top 80 --improve
          else
            echo "LIVE — intraday scan of the FULL NSE universe + real-time Telegram alerts"
            node scripts/screener.mjs --tf intraday --full
          fi
      - name: Persist state back to repo (accumulates ledger/goal, dedups Telegram)
        run: |
          git config user.name "protrader-bot"
          git config user.email "bot@stocksbyvarsha.local"
          git add public/ledger.json public/goal.json public/tuning.json public/tg_sent.json public/track_record.json public/board*.json public/learning.json public/news.json public/delivery.json public/delivery_history.json public/trade_book.json public/picks.json 2>/dev/null || true
          git commit -m "state $(date -u +%FT%RZ)" || echo "no state changes"
          git push || echo "push skipped"
      - name: Deploy to Vercel (tradingview project → stocksbyvarsha.vercel.app)
        run: |
          npx --yes vercel@latest link --yes --project tradingview --scope vishalcurators-projects --token=${{ secrets.VERCEL_TOKEN }}
          npx --yes vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
